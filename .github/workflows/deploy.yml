name: Deploy NexTrade Backend

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack to deploy"
        required: true
        default: "NexTrade-Network"
        type: choice
        options:
          - NexTrade-Network
          - NexTrade-Data
          - NexTrade-Auth
          - NexTrade-Storage
          - NexTrade-Cache
          - NexTrade-Search
          - NexTrade-Pipeline
          - NexTrade-Compute

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextrade-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nextrade-backend/package-lock.json

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - run: npm install

      - name: cdk diff
        run: npx aws-cdk diff ${{ github.event.inputs.stack }}
        continue-on-error: true

      - name: cdk deploy
        run: npx aws-cdk deploy ${{ github.event.inputs.stack }} --require-approval never --exclusively
