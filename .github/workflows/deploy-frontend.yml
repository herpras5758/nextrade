name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'nextrade-frontend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: nextrade-frontend
        run: npm install

      - name: Build
        working-directory: nextrade-frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-3

      - name: Deploy to S3
        run: |
          aws s3 sync nextrade-frontend/dist/ \
            s3://nextrade-frontend-135135392480-ap-southeast-3 \
            --delete \
            --region ap-southeast-3

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1EQ0O8PEZYLG1 \
            --paths "/*" \
            --no-cli-pager
